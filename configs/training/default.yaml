# ============================================================================
# Training Configuration
# ============================================================================

# ---------- Data Splits (time-based) ----------
splits:
  train_end: "2018-12-31"
  val_start: "2019-01-01"
  val_end: "2020-12-31"
  test_start: "2021-01-01"
  test_end: "2024-12-31"

# ---------- Optimization ----------
optimizer:
  name: "adamw"
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  name: "cosine"
  warmup_steps: 200
  min_lr: 1.0e-6

# ---------- Training Loop ----------
training:
  max_epochs: 100
  batch_size: 32
  gradient_accumulation_steps: 2
  mixed_precision: false       # fp16 / bf16
  gradient_clip_val: 1.0
  early_stopping:
    monitor: "val/underpricing_mae"
    patience: 10
    mode: "min"
  checkpoint:
    save_top_k: 3
    monitor: "val/underpricing_mae"

# ---------- Reproducibility ----------
seed: 42
deterministic: true
